<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Facultad</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

.event {
    padding: 8px;
    background: rgba(255,255,255,0.1);
    margin-top: 5px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>📅 Mi Facultad</h1>

<div class="card">
<h3>Login</h3>
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="contraseña">
<button onclick="login()">Entrar</button>
</div>

<div class="card">
<h3>Agregar Evento</h3>
<input id="title" placeholder="Examen...">
<input id="date" type="date">
<button onclick="addEvent()">Guardar Evento</button>
</div>

<div class="card">
<h3>Eventos</h3>
<div id="events"></div>
</div>

<div class="card">
<h3>Nota del día</h3>
<textarea id="note" placeholder="Qué hiciste hoy"></textarea>
<button onclick="saveNote()">Guardar</button>
</div>

</div>

<script>
let user_id = null;

function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(r => r.json())
    .then(data => {
        user_id = data.user_id;
        alert("Logueado");
        loadEvents();
    });
}

function addEvent() {
    fetch("/add_event", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id,
            title: document.getElementById("title").value,
            date: document.getElementById("date").value
        })
    })
    .then(() => loadEvents());
}

function loadEvents() {
    fetch("/events/" + user_id)
    .then(r => r.json())
    .then(data => {
        const div = document.getElementById("events");
        div.innerHTML = "";
        data.forEach(e => {
            div.innerHTML += `<div class="event">${e[1]} - ${e[2]}</div>`;
        });
    });
}

function saveNote() {
    const today = new Date().toISOString().split("T")[0];

    fetch("/save_note", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_id,
            date: today,
            content: document.getElementById("note").value
        })
    });

    alert("Guardado");
}
</script>

</body>
</html>

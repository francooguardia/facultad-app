<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Facultad</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    margin-top: 50px;
}

.card {
    background: #1e293b;
    padding: 25px;
    margin: 15px 0;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.materia {
    background: #334155;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Mi Facultad</h1>

<!-- REGISTER -->
<div class="card">
<h3>Registro</h3>
<input id="reg_user" placeholder="usuario">
<input id="reg_email" placeholder="email">
<input id="reg_pass" type="password" placeholder="contraseña">
<button onclick="register()">Registrarse</button>
</div>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- AGREGAR MATERIA -->
<div class="card">
<h3>Agregar Materia</h3>

<input id="materia" placeholder="Nombre materia">

<select id="dia">
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
</select>

<input id="hora" type="time">

<button onclick="addMateria()">Agregar</button>
</div>

<!-- CRONOGRAMA -->
<div class="card">
<h3>Cronograma semanal</h3>
<div id="cronograma"></div>
</div>

</div>

<script>

let user_id = null;
let materias = [];

function register() {
    fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: reg_user.value,
            password: reg_pass.value,
            email: reg_email.value
        })
    })
    .then(r => r.json())
    .then(() => {
        alert("Registrado correctamente 📧");
    });
}

function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user.value,
            password: pass.value
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.user_id) {
            user_id = data.user_id;
            alert("Login correcto ✅");
        } else {
            alert("Error login ❌");
        }
    });
}

function addMateria() {
    if (!user_id) {
        alert("Primero logueate");
        return;
    }

    const m = {
        nombre: materia.value,
        dia: dia.value,
        hora: hora.value
    };

    materias.push(m);
    render();
}

function render() {
    const div = document.getElementById("cronograma");
    div.innerHTML = "";

    const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

    dias.forEach(dia => {
        div.innerHTML += `<h4>${dia}</h4>`;

        materias
        .filter(m => m.dia === dia)
        .forEach(m => {
            div.innerHTML += `<div class="materia">${m.hora} - ${m.nombre}</div>`;
        });

        div.innerHTML += `<div class="materia">16:30 - Recreo</div>`;
    });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Facultad</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.tabs {
    display: flex;
    margin-top: 10px;
}

.tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    background: #0f172a;
}

.tab.active {
    background: #3b82f6;
}

.hidden {
    display: none;
}

.msg {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
<h1>📚 Mi Facultad</h1>

<div class="card">

<div class="tabs">
<div class="tab active" onclick="showLogin()">Login</div>
<div class="tab" onclick="showRegister()">Register</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="login_user" placeholder="Usuario">
<input id="login_pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
<input id="reg_user" placeholder="Usuario">
<input id="reg_email" placeholder="Email">
<input id="reg_pass" type="password" placeholder="Contraseña">
<button onclick="register()">Crear cuenta</button>
</div>

<div id="msg" class="msg"></div>

</div>

</div>

<script>

function showLogin(){
    loginBox.classList.remove("hidden");
    registerBox.classList.add("hidden");
}

function showRegister(){
    loginBox.classList.add("hidden");
    registerBox.classList.remove("hidden");
}

// LOGIN
function login(){
    fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            username: login_user.value,
            password: login_pass.value
        })
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.user_id){
            msg.innerHTML = "✅ Bienvenido!";
        } else {
            msg.innerHTML = "❌ Datos incorrectos";
        }
    });
}

// REGISTER
function register(){
    fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            username: reg_user.value,
            email: reg_email.value,
            password: reg_pass.value
        })
    })
    .then(r=>r.json())
    .then(data=>{
        msg.innerHTML = "✅ Usuario creado!";
    });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Facultad</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

.card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

h3 {
    margin-bottom: 10px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
}

button {
    margin-top: 12px;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
}

.materia {
    background: #334155;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.dia {
    margin-top: 15px;
}

.badge {
    background: #22c55e;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Mi Facultad</h1>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- AGREGAR MATERIA -->
<div class="card">
<h3>Agregar Materia</h3>

<input id="materia" placeholder="Nombre de la materia">

<select id="dia">
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
</select>

<input id="hora" type="time">

<button onclick="addMateria()">Agregar</button>
</div>

<!-- CRONOGRAMA -->
<div class="card">
<h3>Cronograma semanal</h3>
<div id="cronograma"></div>
</div>

</div>

<script>

let user_id = null;
let materias = [];

function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user.value,
            password: pass.value
        })
    })
    .then(r => r.json())
    .then(data => {
        if(data.user_id){
            user_id = data.user_id;
            alert("✅ Logueado correctamente");
        } else {
            alert("❌ Usuario o contraseña incorrectos");
        }
    });
}

function addMateria() {
    const m = {
        nombre: document.getElementById("materia").value,
        dia: document.getElementById("dia").value,
        hora: document.getElementById("hora").value
    };

    if(!m.nombre || !m.hora){
        alert("Completa los campos");
        return;
    }

    materias.push(m);
    render();
}

function render() {
    const div = document.getElementById("cronograma");
    div.innerHTML = "";

    const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

    dias.forEach(dia => {
        div.innerHTML += `<div class="dia"><h4>${dia}</h4></div>`;

        materias
        .filter(m => m.dia === dia)
        .sort((a,b) => a.hora.localeCompare(b.hora))
        .forEach(m => {
            div.innerHTML += `
            <div class="materia">
                <span>${m.hora} - ${m.nombre}</span>
                <span class="badge">Clase</span>
            </div>`;
        });

        // recreo fijo
        div.innerHTML += `
        <div class="materia">
            <span>16:30 - Recreo</span>
            <span class="badge">Break</span>
        </div>`;
    });
}

</script>

</body>
</html>

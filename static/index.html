<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Facultad</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
}

.materia {
    background: #334155;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 Mi Facultad</h1>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- AGREGAR MATERIA -->
<div class="card">
<h3>Agregar Materia</h3>

<input id="materia" placeholder="Nombre materia">

<select id="dia">
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
</select>

<input id="hora" type="time">

<button onclick="addMateria()">Agregar</button>
</div>

<!-- CRONOGRAMA -->
<div class="card">
<h3>Cronograma semanal</h3>
<div id="cronograma"></div>
</div>

</div>

<script>

let user_id = null;
let materias = [];

function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user.value,
            password: pass.value
        })
    })
    .then(r => r.json())
    .then(data => {
        user_id = data.user_id;
        alert("Logueado");
    });
}

function addMateria() {
    const m = {
        nombre: document.getElementById("materia").value,
        dia: document.getElementById("dia").value,
        hora: document.getElementById("hora").value
    };

    materias.push(m);
    render();
}

function render() {
    const div = document.getElementById("cronograma");
    div.innerHTML = "";

    const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];

    dias.forEach(dia => {
        div.innerHTML += `<h4>${dia}</h4>`;

        materias
        .filter(m => m.dia === dia)
        .forEach(m => {
            div.innerHTML += `<div class="materia">${m.hora} - ${m.nombre}</div>`;
        });

        // recreo automático
        div.innerHTML += `<div class="materia">16:30 - Recreo</div>`;
    });
}

</script>

</body>
</html>
